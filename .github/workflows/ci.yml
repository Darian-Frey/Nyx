name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # cpal on Linux links against ALSA at build time, not at test time,
  # so CI runs without a real audio device. Tests that need device
  # access are gated behind `#[ignore]` in the source.
  RUST_BACKTRACE: 1
  # Pin the toolchain so clippy/rustfmt lint sets don't drift
  # silently as new Rust versions ship. Bump this intentionally — the
  # whole workflow uses it.
  RUST_TOOLCHAIN: "1.95.0"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy
      - name: install system audio deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev pkg-config
      - uses: Swatinem/rust-cache@v2
      - name: clippy workspace
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: install system audio deps (linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev pkg-config
      - uses: Swatinem/rust-cache@v2
      - name: build
        run: cargo build --workspace
      - name: test
        # No-alloc guards (DenyAllocGuard) and golden-file DSP regression
        # checks are regular #[test] functions — they run here as part
        # of the normal workspace test suite.
        run: cargo test --workspace

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@v2
        with:
          cache-targets: "false"
      - name: install cargo-audit
        run: cargo install --locked cargo-audit
      - run: cargo audit

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          # `cargo-deny check` with no extra flags scans licenses,
          # advisories, banned crates, and sources. All-features resolution
          # is set via `[graph] all-features = true` in deny.toml.
          command: check

  wasm-build:
    name: wasm32 build
    runs-on: ubuntu-latest
    # Headless DSP engine must compile for wasm32-unknown-unknown so
    # the Phase B (browser) work doesn't regress. See
    # docs/phase-b-wasm.md for the scope decisions and what's gated
    # out of the WASM build.
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: build nyx-core (default features off)
        run: cargo build -p nyx-core --target wasm32-unknown-unknown --no-default-features
      - name: build nyx-seq
        run: cargo build -p nyx-seq --target wasm32-unknown-unknown --no-default-features
      - name: build nyx-prelude
        run: cargo build -p nyx-prelude --target wasm32-unknown-unknown --no-default-features
      - name: build nyx-core + wav feature
        run: cargo build -p nyx-core --target wasm32-unknown-unknown --no-default-features --features wav
      - name: build nyx-core + osc feature
        run: cargo build -p nyx-core --target wasm32-unknown-unknown --no-default-features --features osc
      - name: build nyx-core + midi feature (WebMIDI backend)
        run: cargo build -p nyx-core --target wasm32-unknown-unknown --no-default-features --features midi
      - name: build nyx-wasm-demo (end-to-end browser demo)
        run: cargo build -p nyx-wasm-demo --target wasm32-unknown-unknown
