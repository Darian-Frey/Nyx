<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nyx-Audio — WASM demos</title>
    <style>
        :root {
            --bg: #0e0e12;
            --fg: #d8d8e0;
            --muted: #6a6a7a;
            --accent: #e8a26b;
            --accent-alt: #6bd4e8;
            --panel: #1a1a22;
            --panel-edge: #3a3a46;
        }
        body {
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            background: var(--bg);
            color: var(--fg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 2rem 1rem;
            box-sizing: border-box;
        }
        h1 {
            font-size: 1.4rem;
            font-weight: 500;
            color: var(--accent);
            margin: 0 0 0.5rem;
        }
        p {
            max-width: 36rem;
            text-align: center;
            color: #8c8ca0;
            line-height: 1.5;
            margin: 0 0 2rem;
        }
        .panels {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            width: 100%;
            max-width: 48rem;
            margin-bottom: 1.5rem;
        }
        .panel {
            background: var(--panel);
            border: 1px solid var(--panel-edge);
            border-radius: 0.25rem;
            padding: 0.75rem;
        }
        .panel-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
            margin-bottom: 0.4rem;
        }
        canvas {
            display: block;
            width: 100%;
            height: 140px;
            background: #0a0a0e;
            border-radius: 0.15rem;
        }
        button {
            background: var(--panel);
            color: var(--fg);
            border: 1px solid var(--panel-edge);
            padding: 0.75rem 2rem;
            font-family: inherit;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 0.25rem;
            transition: all 0.15s;
        }
        button:hover { border-color: var(--accent); color: var(--accent); }
        button.playing { border-color: var(--accent-alt); color: var(--accent-alt); }
        .controls {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        #status { margin-top: 1.5rem; font-size: 0.85rem; color: var(--muted); }
    </style>
</head>
<body>
    <h1>nyx — audio synthesis in Rust, compiled for the browser</h1>
    <p>
        Patches rendered by Nyx's DSP engine inside a WebAudio graph.
        The oscilloscope and spectrum views below read from the same
        signal chain via lock-free ring buffers.
    </p>

    <div class="panels">
        <div class="panel">
            <div class="panel-label">oscilloscope</div>
            <canvas id="scope"></canvas>
        </div>
        <div class="panel">
            <div class="panel-label">spectrum</div>
            <canvas id="spectrum"></canvas>
        </div>
    </div>

    <div class="controls">
        <button id="play-pad" data-demo="pad">A-minor pad</button>
        <button id="play-tron" data-demo="tron">Tron cue (90 s)</button>
    </div>
    <div id="status">loading WASM…</div>

    <script type="module">
        import init, { NyxDemo } from "./pkg/nyx_wasm_demo.js";

        const buttons = Array.from(document.querySelectorAll("button[data-demo]"));
        const status = document.getElementById("status");
        const scopeCanvas = document.getElementById("scope");
        const specCanvas = document.getElementById("spectrum");

        const FG = "#d8d8e0";
        const ACCENT = "#e8a26b";
        const ACCENT_ALT = "#6bd4e8";

        // Pre-allocate typed arrays so `draw()` never hits the GC.
        // Scope: plenty of headroom for one rAF tick at 60 fps / 44.1 kHz.
        const scopeBuf = new Float32Array(2048);
        // Spectrum: sized lazily once the first FFT frame has arrived.
        let specBuf = null;

        function sizeCanvas(c) {
            // Respect device pixel ratio so the display is crisp on HiDPI.
            const dpr = window.devicePixelRatio || 1;
            const cw = c.clientWidth;
            const ch = c.clientHeight;
            c.width = Math.floor(cw * dpr);
            c.height = Math.floor(ch * dpr);
            c.getContext("2d").setTransform(dpr, 0, 0, dpr, 0, 0);
        }
        function resize() { sizeCanvas(scopeCanvas); sizeCanvas(specCanvas); }
        window.addEventListener("resize", resize);

        function drawScope(samples, count) {
            const ctx = scopeCanvas.getContext("2d");
            const w = scopeCanvas.clientWidth;
            const h = scopeCanvas.clientHeight;
            ctx.clearRect(0, 0, w, h);
            if (count < 2) return;
            // Midline.
            ctx.strokeStyle = "#2a2a34";
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(0, h / 2);
            ctx.lineTo(w, h / 2);
            ctx.stroke();
            // Waveform.
            ctx.strokeStyle = ACCENT_ALT;
            ctx.lineWidth = 1.25;
            ctx.beginPath();
            for (let i = 0; i < count; i++) {
                const x = (i / (count - 1)) * w;
                // Samples are centred around 0; clamp display to ±1.2.
                const s = Math.max(-1.2, Math.min(1.2, samples[i]));
                const y = h / 2 - s * (h / 2 - 4);
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.stroke();
        }

        function drawSpectrum(interleaved, bins) {
            const ctx = specCanvas.getContext("2d");
            const w = specCanvas.clientWidth;
            const h = specCanvas.clientHeight;
            ctx.clearRect(0, 0, w, h);
            if (bins === 0) return;
            // Show the first 20 kHz of bins, log-magnitude.
            const maxHz = 20000;
            let usable = 0;
            for (let i = 0; i < bins; i++) {
                if (interleaved[2 * i] <= maxHz) usable = i + 1;
            }
            if (usable < 2) return;
            ctx.fillStyle = ACCENT;
            const barWidth = Math.max(1, w / usable);
            for (let i = 0; i < usable; i++) {
                const mag = interleaved[2 * i + 1];
                // Log-scale magnitude for readability.
                const db = 20 * Math.log10(mag + 1e-6);
                const norm = Math.max(0, Math.min(1, (db + 60) / 60));
                const bh = norm * (h - 4);
                ctx.fillRect(i * barWidth, h - bh, barWidth * 0.9, bh);
            }
        }

        let demo = null;
        let rafId = null;

        function draw() {
            rafId = requestAnimationFrame(draw);
            if (!demo) return;

            // Scope.
            const n = demo.read_scope(scopeBuf);
            drawScope(scopeBuf, n);

            // Spectrum — allocate the receive buffer lazily, once we
            // know how many bins the FFT produces.
            if (!specBuf) {
                const bins = demo.spectrum_bin_count();
                if (bins > 0) specBuf = new Float32Array(2 * bins);
            }
            if (specBuf) {
                const m = demo.read_spectrum(specBuf);
                drawSpectrum(specBuf, m);
            }
        }

        await init();
        resize();
        status.textContent = "ready";
        rafId = requestAnimationFrame(draw);

        // Track which demo (if any) is currently playing so clicking the
        // active button stops it, clicking a different button crossfades
        // by stopping the old one and starting the new one.
        let currentDemo = null;

        function stopCurrent() {
            if (demo) {
                demo.free();
                demo = null;
                specBuf = null;
            }
            for (const b of buttons) {
                b.classList.remove("playing");
                const label = b.dataset.demo === "pad" ? "A-minor pad" : "Tron cue (90 s)";
                b.textContent = label;
            }
            currentDemo = null;
        }

        function startDemo(kind, button) {
            const newDemo = kind === "tron" ? NyxDemo.tron() : new NyxDemo();
            demo = newDemo;
            currentDemo = kind;
            button.classList.add("playing");
            button.textContent = "stop";
            status.textContent = kind === "tron" ? "playing tron cue" : "playing pad";
        }

        for (const button of buttons) {
            button.addEventListener("click", () => {
                try {
                    const kind = button.dataset.demo;
                    if (currentDemo === kind) {
                        stopCurrent();
                        status.textContent = "stopped";
                    } else {
                        stopCurrent();
                        startDemo(kind, button);
                    }
                } catch (e) {
                    status.textContent = `error: ${e}`;
                    console.error(e);
                }
            });
        }
    </script>
</body>
</html>
