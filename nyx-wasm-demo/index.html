<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nyx-Audio — WASM demos</title>
    <style>
        :root {
            --bg: #0e0e12;
            --fg: #d8d8e0;
            --muted: #6a6a7a;
            --accent: #e8a26b;
            --accent-alt: #6bd4e8;
            --panel: #1a1a22;
            --panel-edge: #3a3a46;
        }
        body {
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            background: var(--bg);
            color: var(--fg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 2rem 1rem;
            box-sizing: border-box;
        }
        h1 {
            font-size: 1.4rem;
            font-weight: 500;
            color: var(--accent);
            margin: 0 0 0.5rem;
        }
        p {
            max-width: 36rem;
            text-align: center;
            color: #8c8ca0;
            line-height: 1.5;
            margin: 0 0 2rem;
        }
        .panels {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            width: 100%;
            max-width: 48rem;
            margin-bottom: 1.5rem;
        }
        .panel {
            background: var(--panel);
            border: 1px solid var(--panel-edge);
            border-radius: 0.25rem;
            padding: 0.75rem;
        }
        .panel-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
            margin-bottom: 0.4rem;
        }
        canvas {
            display: block;
            width: 100%;
            height: 140px;
            background: #0a0a0e;
            border-radius: 0.15rem;
        }
        button {
            background: var(--panel);
            color: var(--fg);
            border: 1px solid var(--panel-edge);
            padding: 0.75rem 2rem;
            font-family: inherit;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 0.25rem;
            transition: all 0.15s;
        }
        button:hover { border-color: var(--accent); color: var(--accent); }
        button.playing { border-color: var(--accent-alt); color: var(--accent-alt); }
        .controls {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        #preset-panel {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 0.9rem;
            margin-top: 1.25rem;
            width: 100%;
            max-width: 48rem;
        }
        #preset-panel.active { display: flex; }
        #preset-panel .preset-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: var(--muted);
        }
        #preset-select {
            background: var(--panel);
            color: var(--fg);
            border: 1px solid var(--panel-edge);
            padding: 0.4rem 0.6rem;
            font-family: inherit;
            font-size: 0.9rem;
            border-radius: 0.2rem;
            cursor: pointer;
        }
        #preset-select:hover { border-color: var(--accent); }
        #keys {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 0.3rem;
            width: 100%;
        }
        #keys button {
            padding: 0.6rem 0.2rem;
            font-size: 0.75rem;
            min-width: 0;
        }
        #keys button.black {
            background: #0a0a0e;
            color: var(--muted);
        }
        #keys button.black:hover { color: var(--accent); }
        #keys button.flash {
            border-color: var(--accent-alt);
            color: var(--accent-alt);
        }
        #status { margin-top: 1.5rem; font-size: 0.85rem; color: var(--muted); }
    </style>
</head>
<body>
    <h1>nyx — audio synthesis in Rust, compiled for the browser</h1>
    <p>
        Patches rendered by Nyx's DSP engine inside a WebAudio graph.
        The oscilloscope and spectrum views below read from the same
        signal chain via lock-free ring buffers.
    </p>

    <div class="panels">
        <div class="panel">
            <div class="panel-label">oscilloscope</div>
            <canvas id="scope"></canvas>
        </div>
        <div class="panel">
            <div class="panel-label">spectrum</div>
            <canvas id="spectrum"></canvas>
        </div>
    </div>

    <div class="controls">
        <button id="play-pad" data-demo="pad">A-minor pad</button>
        <button id="play-tron" data-demo="tron">Tron cue (90 s)</button>
        <button id="play-presets" data-demo="presets">Presets</button>
    </div>

    <div id="preset-panel">
        <div class="preset-row">
            <label for="preset-select">voice</label>
            <select id="preset-select"></select>
        </div>
        <div id="keys"></div>
    </div>

    <div id="status">loading WASM…</div>

    <script type="module">
        import init, { NyxDemo, NyxPresets } from "./pkg/nyx_wasm_demo.js";

        const buttons = Array.from(document.querySelectorAll("button[data-demo]"));
        const status = document.getElementById("status");
        const scopeCanvas = document.getElementById("scope");
        const specCanvas = document.getElementById("spectrum");
        const presetPanel = document.getElementById("preset-panel");
        const presetSelect = document.getElementById("preset-select");
        const keysEl = document.getElementById("keys");

        const FG = "#d8d8e0";
        const ACCENT = "#e8a26b";
        const ACCENT_ALT = "#6bd4e8";

        // Pre-allocate typed arrays so `draw()` never hits the GC.
        // Scope: plenty of headroom for one rAF tick at 60 fps / 44.1 kHz.
        const scopeBuf = new Float32Array(2048);
        // Spectrum: sized lazily once the first FFT frame has arrived.
        let specBuf = null;

        function sizeCanvas(c) {
            // Respect device pixel ratio so the display is crisp on HiDPI.
            const dpr = window.devicePixelRatio || 1;
            const cw = c.clientWidth;
            const ch = c.clientHeight;
            c.width = Math.floor(cw * dpr);
            c.height = Math.floor(ch * dpr);
            c.getContext("2d").setTransform(dpr, 0, 0, dpr, 0, 0);
        }
        function resize() { sizeCanvas(scopeCanvas); sizeCanvas(specCanvas); }
        window.addEventListener("resize", resize);

        function drawScope(samples, count) {
            const ctx = scopeCanvas.getContext("2d");
            const w = scopeCanvas.clientWidth;
            const h = scopeCanvas.clientHeight;
            ctx.clearRect(0, 0, w, h);
            if (count < 2) return;
            // Midline.
            ctx.strokeStyle = "#2a2a34";
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(0, h / 2);
            ctx.lineTo(w, h / 2);
            ctx.stroke();
            // Waveform.
            ctx.strokeStyle = ACCENT_ALT;
            ctx.lineWidth = 1.25;
            ctx.beginPath();
            for (let i = 0; i < count; i++) {
                const x = (i / (count - 1)) * w;
                // Samples are centred around 0; clamp display to ±1.2.
                const s = Math.max(-1.2, Math.min(1.2, samples[i]));
                const y = h / 2 - s * (h / 2 - 4);
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.stroke();
        }

        function drawSpectrum(interleaved, bins) {
            const ctx = specCanvas.getContext("2d");
            const w = specCanvas.clientWidth;
            const h = specCanvas.clientHeight;
            ctx.clearRect(0, 0, w, h);
            if (bins === 0) return;
            // Show the first 20 kHz of bins, log-magnitude.
            const maxHz = 20000;
            let usable = 0;
            for (let i = 0; i < bins; i++) {
                if (interleaved[2 * i] <= maxHz) usable = i + 1;
            }
            if (usable < 2) return;
            ctx.fillStyle = ACCENT;
            const barWidth = Math.max(1, w / usable);
            for (let i = 0; i < usable; i++) {
                const mag = interleaved[2 * i + 1];
                // Log-scale magnitude for readability.
                const db = 20 * Math.log10(mag + 1e-6);
                const norm = Math.max(0, Math.min(1, (db + 60) / 60));
                const bh = norm * (h - 4);
                ctx.fillRect(i * barWidth, h - bh, barWidth * 0.9, bh);
            }
        }

        let demo = null;
        let rafId = null;

        function draw() {
            rafId = requestAnimationFrame(draw);
            if (!demo) return;

            // Scope.
            const n = demo.read_scope(scopeBuf);
            drawScope(scopeBuf, n);

            // Spectrum — allocate the receive buffer lazily, once we
            // know how many bins the FFT produces.
            if (!specBuf) {
                const bins = demo.spectrum_bin_count();
                if (bins > 0) specBuf = new Float32Array(2 * bins);
            }
            if (specBuf) {
                const m = demo.read_spectrum(specBuf);
                drawSpectrum(specBuf, m);
            }
        }

        await init();
        resize();
        status.textContent = "ready";
        rafId = requestAnimationFrame(draw);

        // Keyboard: one chromatic octave starting at C4 (MIDI 60).
        // `black` marks the five accidentals within the octave so the
        // layout reads like piano keys.
        const NOTE_NAMES = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
        const BLACK_IDX = new Set([1, 3, 6, 8, 10]);
        const KEY_BASE_MIDI = 60;

        function midiToFreq(m) {
            return 440 * Math.pow(2, (m - 69) / 12);
        }

        function buildKeys() {
            keysEl.innerHTML = "";
            for (let i = 0; i < 12; i++) {
                const midi = KEY_BASE_MIDI + i;
                const btn = document.createElement("button");
                btn.textContent = NOTE_NAMES[i];
                btn.dataset.midi = String(midi);
                if (BLACK_IDX.has(i)) btn.classList.add("black");
                btn.addEventListener("click", () => {
                    if (!demo || currentDemo !== "presets") return;
                    try {
                        const preset = Number(presetSelect.value);
                        demo.play_note(preset, midiToFreq(midi));
                        btn.classList.add("flash");
                        setTimeout(() => btn.classList.remove("flash"), 120);
                    } catch (e) {
                        status.textContent = `error: ${e}`;
                        console.error(e);
                    }
                });
                keysEl.appendChild(btn);
            }
        }

        function populatePresetSelect() {
            const names = NyxPresets.preset_names().split(",");
            presetSelect.innerHTML = "";
            names.forEach((name, i) => {
                const opt = document.createElement("option");
                opt.value = String(i);
                opt.textContent = name;
                presetSelect.appendChild(opt);
            });
        }

        // Track which demo (if any) is currently playing so clicking the
        // active button stops it, clicking a different button crossfades
        // by stopping the old one and starting the new one.
        let currentDemo = null;

        const DEMO_LABELS = {
            pad: "A-minor pad",
            tron: "Tron cue (90 s)",
            presets: "Presets",
        };

        function stopCurrent() {
            if (demo) {
                demo.free();
                demo = null;
                specBuf = null;
            }
            for (const b of buttons) {
                b.classList.remove("playing");
                b.textContent = DEMO_LABELS[b.dataset.demo] ?? b.dataset.demo;
            }
            presetPanel.classList.remove("active");
            currentDemo = null;
        }

        function startDemo(kind, button) {
            if (kind === "presets") {
                demo = new NyxPresets();
                presetPanel.classList.add("active");
            } else if (kind === "tron") {
                demo = NyxDemo.tron();
            } else {
                demo = new NyxDemo();
            }
            currentDemo = kind;
            button.classList.add("playing");
            button.textContent = "stop";
            status.textContent =
                kind === "presets" ? "pick a voice, play a key" :
                kind === "tron" ? "playing tron cue" :
                "playing pad";
        }

        for (const button of buttons) {
            button.addEventListener("click", () => {
                try {
                    const kind = button.dataset.demo;
                    if (currentDemo === kind) {
                        stopCurrent();
                        status.textContent = "stopped";
                    } else {
                        stopCurrent();
                        startDemo(kind, button);
                    }
                } catch (e) {
                    status.textContent = `error: ${e}`;
                    console.error(e);
                }
            });
        }

        populatePresetSelect();
        buildKeys();
    </script>
</body>
</html>
